name: Promote sandbox to production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm — this pushes the current sandbox to the live production site'
        required: true
        default: ''

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'publish'
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Oak Room Promote Bot"
          git config user.email "actions@github.com"

      - name: Merge sandbox into main
        run: |
          git fetch origin sandbox
          git merge origin/sandbox --no-ff -m "Promote sandbox to production"
          git push origin main

      - name: Summary
        run: |
          echo "✓ Promoted sandbox → main."
          echo "Vercel will deploy to production within ~60 seconds."
